*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Malgun Gothic',-apple-system,sans-serif;background:#eef2f8;color:#16213d;font-size:14px}
header.app{background:#fff;border-bottom:1px solid #dde5f0;padding:14px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
header.app .logo{width:34px;height:34px;border-radius:9px;background:#123c85;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px}
header.app h1{font-size:17px;letter-spacing:-.01em}
header.app p{font-size:12px;color:#8590a6;margin-top:2px}
header.app .env{margin-left:auto;font-size:11px;font-weight:800;color:#b45309;background:#fff7ed;border:1px dashed #fdba74;border-radius:7px;padding:4px 10px}
.layout{display:grid;grid-template-columns:280px minmax(0,1fr);gap:14px;padding:14px 22px;align-items:start}
/* 좌측: 범죄 유형 트리 */
.sidebar{background:#fff;border:1px solid #dde5f0;border-radius:12px;padding:12px;position:sticky;top:76px;max-height:calc(100vh - 100px);overflow-y:auto}
.sidebar h2{font-size:12.5px;font-weight:800;color:#5a6577;margin:2px 4px 10px}
.cgroup{margin-bottom:10px}
.cgroup>span{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;color:#8590a6;padding:4px}
.cgroup>span i{width:4px;height:12px;border-radius:2px;display:inline-block}
.crime-btn{display:flex;align-items:center;gap:7px;width:100%;text-align:left;border:1px solid transparent;background:transparent;border-radius:8px;padding:7px 9px;font-size:13px;font-weight:600;color:#2a3550;cursor:pointer;font-family:inherit}
.crime-btn:hover{background:#f2f6fd}
.crime-btn.active{background:#e8f0ff;border-color:#bcd3f7;color:#123c85;font-weight:800}
.crime-btn em{font-style:normal;margin-left:auto;font-size:10px;color:#9aa3b3}
/* 우측 메인 */
.main{display:flex;flex-direction:column;gap:12px;min-width:0}
.card{background:#fff;border:1px solid #dde5f0;border-radius:12px;padding:16px 18px}
.card h3{font-size:14px;font-weight:800;color:#123c85;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.card h3 .step-no{width:20px;height:20px;border-radius:50%;background:#2f6fed;color:#fff;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.crime-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.crime-head .badge-group{font-size:11px;font-weight:800;color:#fff;border-radius:6px;padding:4px 10px}
.crime-head h2{font-size:19px;letter-spacing:-.01em}
.crime-head .law{font-size:11.5px;font-weight:700;color:#6d28d9;background:#f3e8ff;border-radius:6px;padding:4px 9px}
.crime-head p{width:100%;font-size:13px;color:#5a6577;line-height:1.6;margin-top:2px}
.dims{display:flex;gap:5px;margin-left:auto}
.dims b{font-size:10.5px;border-radius:5px;padding:3px 7px;font-weight:800;background:#f3f5f9;color:#9aa3b3}
.dims b.on2{background:#123c85;color:#fff}
.dims b.on1{background:#dbe7fb;color:#2456c9}
table.def{width:100%;border-collapse:collapse}
table.def th{background:#f7faff;font-size:11.5px;color:#8590a6;font-weight:800;text-align:left;padding:8px 10px;border-bottom:1px solid #e6ebf3;white-space:nowrap}
table.def td{padding:8px 10px;font-size:12.5px;border-bottom:1px dashed #eef1f6;vertical-align:top;line-height:1.5}
.req{font-size:10px;font-weight:800;color:#c0392b;background:#fdeaea;border-radius:5px;padding:2px 7px}
.opt{font-size:10px;font-weight:700;color:#8590a6;background:#f3f5f9;border-radius:5px;padding:2px 7px}
.file-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.file-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid #bcd3f7;background:#eef4ff;color:#2456c9;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.file-chip:hover{background:#dcebff}
/* 분석 절차 */
.steps{display:flex;flex-direction:column;gap:8px}
.step-row{display:flex;gap:12px;border:1px solid #e6ebf3;border-radius:10px;padding:11px 13px;align-items:flex-start}
.step-row .no{width:22px;height:22px;border-radius:50%;background:#eef4ff;color:#2456c9;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px}
.step-row .body{flex:1;min-width:0}
.step-row .svc{font-size:13px;font-weight:800;color:#16213d}
.step-row .scopes{display:inline-flex;gap:5px;margin-left:8px;vertical-align:1px}
.step-row .scopes i{font-style:normal;font-size:10px;font-weight:800;color:#1f6feb;background:#e8f0ff;border-radius:5px;padding:2px 7px}
.step-row .how{font-size:12px;color:#5a6577;line-height:1.55;margin-top:4px}
.step-row .out{font-size:11.5px;color:#1f9254;margin-top:3px}
.step-row .out::before{content:"산출물 · ";color:#9aa3b3;font-weight:700}
/* 케이스 카드 */
.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.case-card{border:1.5px solid #dbe3ef;border-radius:12px;padding:14px;cursor:pointer;transition:all .12s;background:#fff}
.case-card:hover{border-color:#9db9e8}
.case-card.sel{border-color:#2f6fed;background:#f5f9ff;box-shadow:0 3px 12px rgba(47,111,237,.14)}
.case-card .type{font-size:10.5px;font-weight:800;border-radius:5px;padding:3px 8px}
.case-card .type.co{background:#e3edff;color:#2456c9}
.case-card .type.ps{background:#fdeef5;color:#be185d}
.case-card h4{font-size:15px;margin:8px 0 2px}
.case-card h4 span{font-size:11.5px;color:#8590a6;font-weight:600;margin-left:5px}
.case-card .risk{float:right;text-align:right}
.case-card .risk b{display:block;font-size:19px;color:#c0392b}
.case-card .risk span{font-size:10.5px;color:#9aa3b3}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin:9px 0}
.kv div{font-size:11.5px;color:#5a6577}
.kv div b{color:#2a3550;margin-left:4px}
.ind{margin-top:8px;border-top:1px dashed #e6ebf3;padding-top:8px}
.ind span{display:block;font-size:10.5px;font-weight:800;color:#9aa3b3;margin-bottom:5px}
.ind li{font-size:12px;color:#b03030;line-height:1.55;margin-left:16px}
/* 실행 */
.run-bar{display:flex;align-items:center;gap:10px}
.run-bar button{border:none;background:#2f6fed;color:#fff;border-radius:9px;padding:10px 22px;font-size:13.5px;font-weight:800;cursor:pointer;font-family:inherit}
.run-bar button:disabled{background:#c8d2e2;cursor:not-allowed}
.run-bar .hint{font-size:12px;color:#8590a6}
.result-step{border:1px solid #e6ebf3;border-radius:10px;margin-bottom:8px;overflow:hidden}
.result-step .rs-head{display:flex;align-items:center;gap:9px;padding:9px 13px;background:#f7faff}
.result-step .rs-head .no{width:20px;height:20px;border-radius:50%;background:#eef4ff;color:#2456c9;font-weight:800;font-size:10.5px;display:flex;align-items:center;justify-content:center}
.result-step .rs-head b{font-size:12.5px}
.result-step .rs-head .st{margin-left:auto;font-size:10.5px;font-weight:800;border-radius:6px;padding:3px 9px}
.st.wait{background:#f3f5f9;color:#9aa3b3}.st.run{background:#e8f0ff;color:#2f6fed}.st.done{background:#e7f5ec;color:#1f9254}
.result-step .rs-body{padding:11px 14px;font-size:12.5px;line-height:1.65;color:#2a3550;border-top:1px solid #eef1f6;white-space:pre-line;display:none}
.result-step.open .rs-body{display:block}
.spin{display:inline-block;width:11px;height:11px;border:2px solid #cfe0f5;border-top-color:#2f6fed;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.verdict{border:1.5px solid #f3c9c9;background:#fff7f7;border-radius:12px;padding:14px 16px;display:none}

.verdict p{font-size:13px;line-height:1.7;white-space:pre-line}

.verdict .acts i{font-style:normal;font-size:11px;font-weight:800;color:#7c2d12;background:#ffedd5;border-radius:6px;padding:4px 10px}
.empty{padding:60px 20px;text-align:center;color:#8590a6;font-size:14px}
.empty b{display:block;font-size:17px;color:#2a3550;margin-bottom:8px}
/* 모달 */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{width:900px;max-width:95vw;max-height:85vh;background:#fff;border-radius:13px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(15,23,42,.32)}

.modal .m-head b{font-size:14.5px}
.modal .m-head span{font-size:11.5px;color:#8590a6}
.modal .m-head button{margin-left:auto;border:1px solid #d8e0ec;background:#fff;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.modal .m-head button.x{border:none;background:#f3f5f9;width:28px;height:28px;padding:0;font-size:14px}
.modal .m-body{overflow:auto;padding:14px 18px}
.modal table{width:100%;border-collapse:collapse;font-size:12px}
.modal th{background:#f7faff;color:#5a6577;font-weight:800;text-align:left;padding:7px 9px;border:1px solid #e6ebf3;white-space:nowrap}
.modal td{padding:6px 9px;border:1px solid #eef1f6;white-space:nowrap}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.sidebar{position:static;max-height:none}.case-grid{grid-template-columns:1fr}}

</head>

/* ═══════════════ 렌더링 ═══════════════ */
const $ = s => document.querySelector(s);
let curCrime = null, curCase = null, running = false;

function renderTree(){
  $("#crimeTree").innerHTML = GROUPS.map(g => `
    <div class="cgroup">
      <span><i style="background:${g.color}"></i>${g.label}</span>
      ${g.crimes.map(id => `
        <button type="button" class="crime-btn" data-crime="${id}">
          ${CRIMES[id].label.split(" — ")[0]}
          <em>${CRIMES[id].company.id}·${CRIMES[id].person.id}</em>
        </button>`).join("")}
    </div>`).join("");
}

function dimBadges(dims){
  const L = {A:"정합성",B:"경로",C:"자금",D:"관계",E:"패턴"};
  return Object.entries(L).map(([k,v]) =>
    `<b class="${dims[k]===2?"on2":dims[k]===1?"on1":""}" title="분석 관점 ${v}: ${dims[k]===2?"중점":dims[k]===1?"보조":"해당없음"}">${v}</b>`).join("");
}

function caseCard(c, type, crimeId){
  return `
    <div class="case-card" data-case="${type}" data-crime="${crimeId}">
      <div class="risk"><b>${c.risk}</b><span>위험점수</span></div>
      <span class="type ${type==="company"?"co":"ps"}">${type==="company"?"우범기업":"우범자"}</span>
      <h4>${c.name}<span>${c.id}${c.role?` · ${c.role}`:""}</span></h4>
      <div class="kv">${c.profile.map(([k,v])=>`<div>${k}<b>${v}</b></div>`).join("")}</div>
      <div class="ind"><span>핵심 우범 지표</span><ul>${c.ind.map(i=>`<li>${i}</li>`).join("")}</ul></div>
    </div>`;
}

function renderCrime(id){
  curCrime = id; curCase = null; running = false;
  const c = CRIMES[id];
  const group = GROUPS.find(g => g.crimes.includes(id));
  document.querySelectorAll(".crime-btn").forEach(b => b.classList.toggle("active", b.dataset.crime === id));
  $("#main").innerHTML = `
    <div class="card">
      <div class="crime-head">
        <span class="badge-group" style="background:${group.color}">${group.label}</span>
        <h2>${c.label}</h2>
        <span class="law">${c.law}</span>
        <div class="dims">${dimBadges(c.dims)}</div>
        <p>${c.summary}</p>
      </div>
    </div>
    <div class="card">
      <h3><span class="step-no">1</span>필요 자료 정의 <span style="font-weight:600;color:#9aa3b3;font-size:11.5px">— 이 범죄 유형 수사에 분석해야 할 정보</span></h3>
      <table class="def">
        <thead><tr><th>자료</th><th>출처</th><th>형식</th><th>분석 용도</th><th>필수</th></tr></thead>
        <tbody>${c.data.map(d=>`
          <tr><td><b>${d.name}</b></td><td>${d.src}</td><td>${d.fmt}</td><td>${d.use}</td>
          <td>${d.req?'<span class="req">필수</span>':'<span class="opt">보조</span>'}</td></tr>`).join("")}
        </tbody>
      </table>
      <div class="file-chips">
        <span style="font-size:11px;font-weight:800;color:#9aa3b3;align-self:center">샘플 데이터</span>
        ${c.data.filter(d=>d.file).map(d=>`<button type="button" class="file-chip" data-file="${d.file}">📄 ${SAMPLE_FILES[d.file].label}</button>`).join("")}
      </div>
    </div>
    <div class="card">
      <h3><span class="step-no">2</span>단계별 분석 절차 <span style="font-weight:600;color:#9aa3b3;font-size:11.5px">— 분석시나리오 AI 서비스·분석범위 기준</span></h3>
      <div class="steps">${c.steps.map((s,i)=>`
        <div class="step-row">
          <div class="no">${i+1}</div>
          <div class="body">
            <span class="svc">${s.svc}</span>
            <span class="scopes">${s.scope.map(x=>`<i>${x}</i>`).join("")}</span>
            <div class="how">${s.how}</div>
            <div class="out">${s.out}</div>
          </div>
        </div>`).join("")}
      </div>
    </div>
    <div class="card">
      <h3><span class="step-no">3</span>수사 Case 선택</h3>
      <div class="case-grid">
        ${caseCard(c.company, "company", id)}
        ${caseCard(c.person, "person", id)}
      </div>
      <div class="run-bar" style="margin-top:12px">
        <button type="button" id="runBtn" disabled>▶ 분석 시뮬레이션 실행</button>
        <span class="hint" id="runHint">우범기업 또는 우범자 Case를 선택하세요.</span>
      </div>
    </div>
    <div class="card" id="resultCard" style="display:none">
      <h3><span class="step-no">4</span>분석 결과 <span id="resultTarget" style="font-weight:600;color:#5a6577;font-size:12px"></span></h3>
      <div id="resultSteps"></div>
      <div class="verdict" id="verdict"></div>
    </div>`;
  window.scrollTo({top:0});
}

function selectCase(type){
  curCase = type;
  document.querySelectorAll(".case-card").forEach(el => el.classList.toggle("sel", el.dataset.case === type));
  $("#runBtn").disabled = false;
  const t = CRIMES[curCrime][type];
  $("#runHint").textContent = `선택: ${t.name} (${t.id}) — 실행 시 단계별 분석 결과가 생성됩니다.`;
}

function runSimulation(){
  if(running || !curCrime || !curCase) return;
  running = true;
  const crime = CRIMES[curCrime];
  const target = crime[curCase];
  const T = `${target.name}(${target.id})`;
  $("#resultCard").style.display = "";
  $("#resultTarget").textContent = `— ${curCase==="company"?"우범기업":"우범자"} ${T}`;
  $("#runBtn").disabled = true;
  $("#verdict").style.display = "none";
  $("#resultSteps").innerHTML = crime.steps.map((s,i)=>`
    <div class="result-step" id="rs${i}">
      <div class="rs-head"><span class="no">${i+1}</span><b>${s.svc}</b><span class="st wait" id="st${i}">대기</span></div>
      <div class="rs-body" id="rb${i}"></div>
    </div>`).join("");
  $("#resultCard").scrollIntoView({behavior:"smooth", block:"start"});
  let i = 0;
  const tick = () => {
    if(i > 0){ // 직전 단계 완료 처리
      const p = i-1;
      $(`#st${p}`).className = "st done"; $(`#st${p}`).textContent = "완료";
      $(`#rb${p}`).textContent = crime.results[p].replaceAll("{T}", T);
      document.getElementById(`rs${p}`).classList.add("open");
    }
    if(i >= crime.steps.length){
      const v = $("#verdict");
      v.style.display = "";
      v.innerHTML = `<h4>⚖ 종합 판정 — 다음 수사 단계</h4>
        <p>${crime.verdict.replaceAll("{T}", T)}</p>
        <div class="acts">${crime.acts.map(a=>`<i>${a}</i>`).join("")}</div>`;
      v.scrollIntoView({behavior:"smooth", block:"nearest"});
      $("#runBtn").disabled = false;
      $("#runBtn").textContent = "↻ 다시 실행";
      running = false;
      return;
    }
    $(`#st${i}`).className = "st run"; $(`#st${i}`).innerHTML = `<span class="spin"></span>분석중`;
    document.getElementById(`rs${i}`).scrollIntoView({behavior:"smooth", block:"nearest"});
    i++;
    setTimeout(tick, 420);
  };
  tick();
}

/* CSV 미리보기 모달 */
function openCsv(ref){
  const f = SAMPLE_FILES[ref];
  if(!f) return;
  $("#csvTitle").textContent = f.label;
  $("#csvDesc").textContent = f.desc;
  const rows = f.csv.trim().split("\n").map(line => {
    const cells = []; let cur = "", q = false;
    for(const ch of line){
      if(ch === '"'){ q = !q; continue; }
      if(ch === "," && !q){ cells.push(cur); cur = ""; continue; }
      cur += ch;
    }
    cells.push(cur);
    return cells;
  });
  $("#csvBody").innerHTML = `<table><thead><tr>${rows[0].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
    <tbody>${rows.slice(1).map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  $("#csvDownload").onclick = () => {
    const blob = new Blob(["﻿" + f.csv], {type:"text/csv;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = f.label; a.click();
    URL.revokeObjectURL(a.href);
  };
  $("#csvOverlay").style.display = "flex";
}

/* 이벤트 위임 */
document.addEventListener("click", e => {
  const cb = e.target.closest(".crime-btn");
  if(cb){ renderCrime(cb.dataset.crime); return; }
  const cc = e.target.closest(".case-card");
  if(cc){ selectCase(cc.dataset.case); return; }
  if(e.target.closest("#runBtn")){ runSimulation(); return; }
  const fc = e.target.closest(".file-chip");
  if(fc){ openCsv(fc.dataset.file); return; }
  if(e.target.closest("#csvClose") || e.target === $("#csvOverlay")){ $("#csvOverlay").style.display = "none"; }
});
document.addEventListener("keydown", e => { if(e.key === "Escape") $("#csvOverlay").style.display = "none"; });

renderTree();
renderCrime("c1_price");   // 초기 선택: 관세포탈(저가신고 가격조작)
</script>
