// 성분별 검출 건수 — 가로 막대(카테고리 6, 직접 라벨)
function substanceChart(){
  const W=560,H=200,ml=88,mr=110,mt=8,mb=8;
  const iw=W-ml-mr, rowH=(H-mt-mb)/SUBSTANCE.length, bh=16, max=3;
  const bars=SUBSTANCE.map((s,i)=>{
    const y=mt+rowH*i+(rowH-bh)/2, w=iw*s.n/max;
    return `<text class="tick" x="${ml-8}" y="${y+12}" text-anchor="end" style="font-size:11px;fill:var(--ink);font-weight:600">${s.name}</text>
      <rect class="hoverpt" x="${ml}" y="${y}" width="${w.toFixed(1)}" height="${bh}" rx="4" fill="${s.color}" data-t="${s.name} · 검출 ${s.n}건 — ${s.note}"/>
      <text class="dlabel" x="${ml+w+7}" y="${y+12}" fill="${s.color}">${s.n}건</text>`;
  }).join("");
  return `<div class="chart-wrap">
    <div class="chart-title">검출 성분별 건수 (분석 12건 · 검출 10건 = 위해물품 확정 9 + 기준초과 1)</div>
    <div class="chart-note">막대에 마우스를 올리면 성분별 위해성 설명이 표시됩니다. 수은은 기준초과, 나머지 5종은 위해물품 확정 사유.</div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="성분별 검출 건수">${bars}</svg>
  </div>`;
}
// 월별 통관 패턴 — 신고건수(막대) + 검사건수(막대), 동일 축(건수)
function patternChart(){
  const W=720,H=240,ml=36,mr=16,mt=14,mb=42, iw=W-ml-mr, ih=H-mt-mb;
  const ymax=5, gap=iw/PATTERN.length, bw=16;
  const y=v=>mt+ih*(1-v/ymax);
  const grid=[0,1,2,3,4,5].map(v=>`<line class="grid" x1="${ml}" y1="${y(v)}" x2="${ml+iw}" y2="${y(v)}"/><text class="tick" x="${ml-6}" y="${y(v)+3}" text-anchor="end">${v}</text>`).join("");
  const bars=PATTERN.map((p,i)=>{
    const cx=ml+gap*i+gap/2;
    const b1=`<rect class="hoverpt" x="${cx-bw-2}" y="${y(p.n).toFixed(1)}" width="${bw}" height="${(mt+ih-y(p.n)).toFixed(1)}" rx="4" fill="var(--s1)" data-t="${p.m} · 신고 ${p.n}건 (특송 ${p.ex}건)"/>`;
    const b2=p.ins?`<rect class="hoverpt" x="${cx+2}" y="${y(p.ins).toFixed(1)}" width="${bw}" height="${(mt+ih-y(p.ins)).toFixed(1)}" rx="4" fill="var(--s6)" data-t="${p.m} · 세관검사 ${p.ins}건"/>`:"";
    return b1+b2+`<text class="tick" x="${cx}" y="${H-24}" text-anchor="middle">${p.m}</text>`;
  }).join("");
  return `<div class="chart-wrap">
    <div class="chart-title">월별 수입신고 건수 대비 세관검사 건수</div>
    <div class="chart-note">신고 38건 중 검사 3건(검사율 7.9%) — 특송·소액 분할로 검사 선별을 회피. 검사가 실시된 2건에서 즉시 위해성분 적발.</div>
    <div class="legend"><span><i class="sq" style="background:var(--s1)"></i>수입신고 건수</span><span><i class="sq" style="background:var(--s6)"></i>세관검사 건수</span></div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="월별 신고·검사 건수">
      ${grid}<line class="axis" x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+ih}"/><line class="axis" x1="${ml}" y1="${mt+ih}" x2="${ml+iw}" y2="${mt+ih}"/>
      ${bars}<text class="tick" x="${ml-24}" y="${mt+6}" transform="rotate(-90 ${ml-24} ${mt+6})">건수</text>
    </svg></div>`;
}
// 유통 채널별 판매·회수 — 스택 막대(미회수 강조)
function distChart(){
  const W=680,H=240,ml=44,mr=16,mt=14,mb=52, iw=W-ml-mr, ih=H-mt-mb;
  const ymax=20000, gap=iw/DIST.length, bw=42;
  const y=v=>mt+ih*(1-v/ymax);
  const grid=[0,5000,10000,15000,20000].map(v=>`<line class="grid" x1="${ml}" y1="${y(v)}" x2="${ml+iw}" y2="${y(v)}"/><text class="tick" x="${ml-6}" y="${y(v)+3}" text-anchor="end">${(v/1000)}k</text>`).join("");
  const bars=DIST.map((d,i)=>{
    const cx=ml+gap*i+gap/2, un=d.sold-d.rec;
    const yRec=y(d.rec), yUn=y(d.sold);
    // 미회수(상단, 빨강) + 회수(하단, 초록) — 2px 서피스 간격
    return `<rect class="hoverpt" x="${cx-bw/2}" y="${yUn.toFixed(1)}" width="${bw}" height="${(yRec-yUn-2).toFixed(1)}" rx="4" fill="var(--s6)" data-t="${d.ch} · 미회수 ${won(un)}정"/>
      <rect class="hoverpt" x="${cx-bw/2}" y="${yRec.toFixed(1)}" width="${bw}" height="${(mt+ih-yRec).toFixed(1)}" rx="4" fill="var(--s4)" data-t="${d.ch} · 회수 ${won(d.rec)}정"/>
      <text class="dlabel" x="${cx}" y="${yUn-5}" text-anchor="middle" fill="var(--s6)">${won(un)}</text>
      <text class="tick" x="${cx}" y="${H-32}" text-anchor="middle">${d.ch}</text>
      <text class="tick" x="${cx}" y="${H-19}" text-anchor="middle" style="fill:var(--ink-2)">${d.item.split(" ")[0]}</text>`;
  }).join("");
  return `<div class="chart-wrap">
    <div class="chart-title">유통 채널별 판매량 · 회수량 (단위: 정)</div>
    <div class="chart-note">총 ${won(TOT.sold)}정 판매 중 ${won(TOT.rec)}정만 회수(회수율 ${TOT.recRate}%) — ${won(TOT.unrec)}정이 시중에 잔존.</div>
    <div class="legend"><span><i class="sq" style="background:var(--s6)"></i>미회수(시중 잔존)</span><span><i class="sq" style="background:var(--s4)"></i>회수 완료</span></div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="채널별 판매·회수">
      ${grid}<line class="axis" x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+ih}"/><line class="axis" x1="${ml}" y1="${mt+ih}" x2="${ml+iw}" y2="${mt+ih}"/>
      ${bars}</svg></div>`;
}
function indicatorBars(){
  return IND.map(d=>`<div class="ind-bar"><span class="name">${d.name}</span>
    <span class="track"><span class="fill" style="width:${d.v}%;background:${d.color}"></span></span>
    <span class="val" style="color:${d.color}">${d.v}%</span></div>`).join("");
}

/* ═══════════ 렌더 ═══════════ */
const $=s=>document.querySelector(s);
let cur=0;
function renderNav(){
  $("#navList").innerHTML=STEPS.map((s,i)=>`
    <button class="nav-item ${i===cur?"active":""} ${i<cur?"done":""}" data-step="${i}">
      <span class="n">${i<cur?"✓":s.no.replace("제","").replace("보","")}</span><span class="lab">${s.nav}</span>
    </button>`).join("");
}
function renderStep(i){
  cur=i; renderNav();
  $("#main").innerHTML=STEPS[i].body();
  window.scrollTo({top:0,behavior:"smooth"});
}
const tip=$("#tip");
document.addEventListener("mousemove",e=>{
  const t=e.target.closest("[data-t]");
  if(t){ tip.textContent=t.dataset.t; tip.style.opacity="1";
    tip.style.left=Math.min(e.clientX+12,innerWidth-tip.offsetWidth-8)+"px";
    tip.style.top=(e.clientY+14)+"px"; }
  else tip.style.opacity="0";
});
document.addEventListener("click",e=>{
  const n=e.target.closest("[data-step]");
  if(n){ renderStep(+n.dataset.step); return; }
  if(e.target.closest("#printBtn")){
    // 전체 보고서 인쇄: 모든 단계를 순서대로 렌더 후 인쇄
    $("#main").innerHTML=STEPS.map(s=>s.body()).join("");
    setTimeout(()=>{ window.print(); renderStep(cur); }, 300);
  }
});
renderStep(0);
</script>
