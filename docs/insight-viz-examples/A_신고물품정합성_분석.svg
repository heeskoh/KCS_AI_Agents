      <text x="30" y="298" class="t-cell s-muted">6개 항목 중 일치 3 · 검토 1 · 불일치 2 — 가격 저가신고 의심 및 환급 소요량 과다 계상</text>
      <rect x="470" y="268" width="146" height="30" rx="8" class="s-crit-soft"/>
