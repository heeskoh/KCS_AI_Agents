<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 관세행정 통합포털</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script type="module" src="/static/app.js"></script>
  <!-- paths resolved by web_server.py STATIC_DIR → web/static -->
</head>
<body>
  <div class="app-shell">
    <main class="main">
      <header class="topbar">
        <div class="top-title">
          <h1>AI 관세행정 통합포털</h1>
          <p>LLM · ML모델 · DW · RAG · 업무시스템 통합 Workbench</p>
        </div>
        <div class="work-tabs" id="workTabs">
          <button class="work-tab active" data-page="home">My AI 분석</button>
        </div>
        <button class="profile profile-switcher" id="profileSwitcherBtn" title="사용자 변경">
          <span>🔔</span><span>✉</span>
          <div class="avatar" id="profileAvatar">김</div>
          <div><strong id="profileName">김기획</strong><small id="profileTeam">정보국 정보기획담당관</small></div>
          <span class="profile-switch-hint">▾</span>
        </button>
      </header>

      <section id="content" class="content"></section>
    </main>
  </div>
</body>
</html>
