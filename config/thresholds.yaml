# =============================================================================
# MK_AI_Agents 비즈니스 로직 임계값 설정
# =============================================================================
# 이 파일의 값을 수정하면 소스코드 변경 없이 분석 기준이 즉시 적용됩니다.
# 변경 후 서버 재시작이 필요합니다.
#
# 법적 근거 표기 규칙:
#   [법령명 조문] 조정 시 해당 조문 기준과 일치 여부 확인 필요
# =============================================================================


# ── 위험 등급 판정 기준 ────────────────────────────────────────────────────────
# agent_ml.py, agent_network.py, agent_company.py 등에서 공통 사용
risk:
  high_score: 70        # 위험점수 ≥ 70 → HIGH 등급
  medium_score: 45      # 위험점수 ≥ 45 → MEDIUM 등급 (미만이면 LOW)


# ── ML 통계 분석 임계값 ───────────────────────────────────────────────────────
# agent_ml.py
ml:
  # 데이터 충분성 기준 (미달 시 합성 데이터 자동 생성)
  min_peer_companies: 3     # Z-score·업종통계 계산용 동종업종 최소 기업 수
  min_decl_per_hs: 5        # HS코드별 IQR 계산용 최소 신고 건수

  # 업종 통계 Z-score 임계값
  industry_zscore_high: 1.5       # Z > 1.5 → 동종 대비 이상 고위험 🔴
  industry_zscore_medium: 0.5     # 0.5 < Z ≤ 1.5 → 동종 평균 초과 🟡

  # HS코드별 위험 판정 기준
  hs_review_rate_high: 0.30       # 검토·조사율 ≥ 30% → 고위험
  hs_diff_pct_high: -25.0         # 타사 대비 가격 차이 ≤ -25% → 고위험
  hs_diff_pct_medium: -10.0       # 타사 대비 가격 차이 ≤ -10% → 주의
  hs_zscore_high: 2.0             # Z ≤ -2.0 → 저가신고 고위험
  hs_zscore_medium: 1.5           # Z ≤ -1.5 → 저가신고 주의

  # 이상치 탐지 Z-score (agent_ml _run_anomaly)
  anomaly_high: 2.5       # |Z| > 2.5 → 고이상치 🔴
  anomaly_medium: 1.5     # |Z| > 1.5 → 이상치 의심 🟡
  anomaly_price_pct: 20.0 # 표준편차 0일 때 가격차이 20% 이상 → 이상치

  # IQR 기반 경계 (HS코드별 가격 분포)
  iqr_low_bound: 0.7      # Q1 × 0.7 미만 → 저가신고 의심
  iqr_high_bound: 1.3     # Q3 × 1.3 초과 → 고가신고 의심


# ── 합성 데이터 생성 파라미터 ──────────────────────────────────────────────────
# agent_ml.py — 실제 데이터 부족 시 통계 분석용 가상 기업·신고 데이터 생성
# ※ 이 값은 분석 신뢰도에 직접 영향. 데이터 충분 시 자동으로 사용되지 않음
synthetic:
  # 가상 기업 프로파일
  risk_std: 18.0            # 위험점수 분포 표준편차
  risk_min: 10.0            # 위험점수 하한
  risk_max: 95.0            # 위험점수 상한
  revenue_factor_min: 0.25  # 연매출 = 기준 × (0.25 ~ 3.0)
  revenue_factor_max: 3.0
  import_factor_min: 0.25   # 연간 수입액 = 기준 × (0.25 ~ 3.0)
  import_factor_max: 3.0

  # 가상 신고 가격 분포 (정규 분포)
  price_normal_mean: 1.0    # 정상 신고: 평균 배수
  price_normal_std: 0.18    # 정상 신고: 표준편차
  price_under_mean: 0.55    # 저가 이상: 평균 배수 (정상의 55%)
  price_under_std: 0.08     # 저가 이상: 표준편차
  anomaly_rate: 0.05        # 신고 중 저가 이상치 비율 (5%)
  price_min: 0.35           # 신고가 최솟값 (기준의 35%)
  price_max: 1.60           # 신고가 최댓값 (기준의 160%)

  # 가상 신고 메타 데이터
  days_ago_max: 548         # 신고일 범위: 최근 N일 이내 (548일 ≈ 18개월)
  duty_rate_min: 0.03       # 신고 관세율 하한 (3%)
  duty_rate_max: 0.12       # 신고 관세율 상한 (12%)
  refund_rate_min: 0.005    # 환급액/수입액 비율 하한
  refund_rate_max: 0.05     # 환급액/수입액 비율 상한
  fta_rate_min: 5.0         # FTA 감면율 하한 (%)
  fta_rate_max: 55.0        # FTA 감면율 상한 (%)


# ── 관계망 분석 임계값 ────────────────────────────────────────────────────────
# agent_network.py
network:
  # 관계법인 위험 판정 [관세법 제23조 특수관계]
  related_high_score: 70        # 위험점수 ≥ 70 → 관계법인 HIGH
  related_medium_score: 45      # 위험점수 ≥ 45 → 관계법인 MEDIUM

  # 알림 발동 기준
  origin_concentration: 0.70    # 단일 원산지 집중도 ≥ 70% → 경보
  fta_reduction_rate: 30.0      # FTA 감면율 ≥ 30% + 고위험 원산지 → 경보
  review_rate: 0.30             # 검토·조사·보류 비율 ≥ 30% → 경보
  combined_risk_score: 70       # 역외 관계법인 + 위험점수 ≥ 70 → 즉각 조사 권고
  edge_review_rate: 0.30        # 엣지(공급자 연결선) 검토율 ≥ 30% → ⚠️ 표시


# ── 품목분류 검증 임계값 ──────────────────────────────────────────────────────
# agent_hs_verify.py [관세법 제86조]
hs_verify:
  price_low_ratio: 0.40    # 타사 평균 대비 ≤ 40% → 저가 이상신고 의심
  price_high_ratio: 2.00   # 타사 평균 대비 ≥ 200% → 고가 이상신고 확인


# ── 수입신고 검증 임계값 ──────────────────────────────────────────────────────
# agent_declaration_verify.py
declaration:
  price_mismatch_threshold: 0.15  # OCR 문서가격 vs DB 신고가격 차이 ≥ 15% → 불일치
  peer_undervalue_high: -0.20     # 동종 평균 대비 ≤ -20% → 저가 의심 🔴
  peer_undervalue_warning: -0.10  # 동종 평균 대비 ≤ -10% → 추가 확인 필요 🟡


# ── 과세가격 평가 임계값 ──────────────────────────────────────────────────────
# agent_customs_value.py [관세법 제30조]
customs_value:
  q1_lower_bound: 0.80      # Q1 × 80% 미만 → 저가신고 의심 🔴
  avg_lower_bound: 0.90     # 평균 × 90% 미만 → 추가 확인 🟡
  q3_upper_bound: 1.20      # Q3 × 120% 초과 → 고가신고 의심 🟡


# ── RAG 검색 파라미터 ────────────────────────────────────────────────────────
# agent_rag.py, agent_audit_search.py
rag:
  top_k: 3             # 컬렉션별 반환 유사 문서 수
  fallback_k: 2        # 전체 통합 검색 시 컬렉션당 반환 수
  audit_top_k: 5       # 조사보고서 단일 검색 기본 반환 수
  audit_max_k: 10      # 조사보고서 검색 최대 반환 수


# ── API 타임아웃 (초) ──────────────────────────────────────────────────────────
# agent_law.py, agent_patent.py, agent_web.py
api:
  law_timeout: 8.0       # 법제처 Open API 타임아웃
  kipris_timeout: 8.0    # KIPRIS Open API 타임아웃
  web_timeout: 20.0      # 웹 검색 API 타임아웃
  web_max_results: 2     # 웹 검색 API 건당 최대 반환 결과 수
